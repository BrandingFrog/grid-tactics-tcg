name: Wiki Backup (Weekly)

on:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 3 AM UTC
  workflow_dispatch: {}   # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: wiki
        run: pip install -e .

      - name: Run backup
        working-directory: wiki
        env:
          MW_API_URL: ${{ secrets.MW_API_URL }}
          MW_BOT_USER: ${{ secrets.MW_BOT_USER }}
          MW_BOT_PASS: ${{ secrets.MW_BOT_PASS }}
          MW_API_PATH: ${{ secrets.MW_API_PATH }}
        run: python -m sync.backup --output-dir ./backup_output

      - uses: actions/upload-artifact@v4
        with:
          name: wiki-backup-${{ github.run_id }}
          path: wiki/backup_output/
          retention-days: 90
