services:
  mediawiki:
    image: ghcr.io/wikiteq/taqasta:latest
    container_name: wiki_mediawiki
    depends_on:
      - db
      - redis
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      MW_SITE_NAME: ${MW_SITE_NAME}
      MW_SITE_SERVER: ${MW_SITE_SERVER}
      MW_SITE_LANG: ${MW_SITE_LANG}
      MW_ADMIN_USER: ${MW_ADMIN_USER}
      MW_ADMIN_PASS: ${MW_ADMIN_PASS}
      MW_DB_TYPE: mysql
      MW_DB_SERVER: db
      MW_DB_NAME: ${MW_DB_NAME}
      MW_DB_USER: ${MW_DB_USER}
      MW_DB_PASS: ${MW_DB_PASS}
      # Use the same wiki user as the installer. MediaWiki's installer will
      # detect installer==runtime and skip its (buggy) CREATE USER/GRANT step.
      # The wiki user already has full privileges on the wiki DB via db-init.
      MW_DB_INSTALLDB_USER: ${MW_DB_USER}
      MW_DB_INSTALLDB_PASS: ${MW_DB_PASS}
      MW_MAIN_CACHE: CACHE_REDIS
      MW_REDIS_SERVERS: redis:6379
      MW_LOAD_EXTENSIONS: SemanticMediaWiki,SemanticResultFormats,PageForms,ParserFunctions,Arrays,Scribunto,CategoryTree
      MW_ENABLE_UPLOADS: "true"
      MW_FILE_EXTENSIONS: png,jpg,jpeg,webp,svg
      MW_SECRET_KEY: ${MW_SECRET_KEY}
    volumes:
      - mw_data:/mediawiki
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: wiki_db
    env_file:
      - .env
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      # NOTE: MariaDB only creates the database. The wiki user is created by
      # Taqasta's installer (MW_DB_USER/MW_DB_PASS) using the root credentials
      # above, so GRANTs use the correct '<user>'@'%' host pattern.
      MARIADB_DATABASE: ${MARIADB_DATABASE}
    volumes:
      - db_data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: wiki_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mw_data:
  db_data:
  redis_data:
